<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Traffic Sign Recognition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.21.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md text-center">

      <!-- Header -->
      <div class="mb-6">
        <h1 class="text-2xl font-bold text-gray-800">🚦 Traffic Sign Recognition</h1>
        <p class="text-gray-400 text-sm mt-1">Upload a photo and let AI identify the sign</p>
      </div>

      <!-- Upload Box -->
      <label for="imageUpload" id="uploadLabel"
        class="cursor-pointer block border-2 border-dashed border-blue-400 rounded-xl p-6 text-blue-500 hover:bg-blue-50 transition">
        <div class="text-3xl mb-1">📁</div>
        <div class="text-sm font-medium">Click to upload an image</div>
        <div class="text-xs text-gray-400 mt-1">JPG, PNG supported</div>
        <input type="file" id="imageUpload" accept="image/*" class="hidden" />
      </label>

      <!-- Image Preview -->
      <img id="preview" src="" alt="Preview"
        class="hidden mt-5 mx-auto rounded-xl max-h-52 object-contain border border-gray-100" />

      <!-- Spinner -->
      <div id="spinner" class="hidden mt-5 flex flex-col items-center gap-2">
        <div class="spinner"></div>
        <p class="text-sm text-gray-400">Analyzing image...</p>
      </div>

      <!-- Result Box -->
      <div id="result" class="hidden mt-5 p-4 rounded-xl border text-left">
        <p class="text-xs text-gray-400 uppercase tracking-wide mb-1">Detected Sign</p>
        <p id="resultLabel" class="text-lg font-bold text-green-700"></p>

        <!-- Confidence Bar -->
        <div class="mt-3">
          <div class="flex justify-between text-xs text-gray-400 mb-1">
            <span>Confidence</span>
            <span id="confidenceText"></span>
          </div>
          <div class="w-full bg-gray-100 rounded-full h-2.5">
            <div id="confidenceBar"
              class="h-2.5 rounded-full transition-all duration-700"
              style="width: 0%">
            </div>
          </div>
        </div>
      </div>

      <!-- Error Box -->
      <div id="errorBox" class="hidden mt-5 p-4 bg-red-50 border border-red-200 rounded-xl text-red-600 text-sm">
      </div>

      <!-- Reset Button -->
      <button id="resetBtn"
        class="hidden mt-5 w-full py-2 rounded-xl border border-gray-200 text-gray-500 text-sm hover:bg-gray-50 transition">
        🔄 Try another image
      </button>

      <!-- Status message (model loading) -->
      <p id="statusMsg" class="mt-4 text-xs text-gray-400"></p>

    </div>

    <script src="app.js"></script>
  </body>
</html>
